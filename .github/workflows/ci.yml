name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests with coverage
        run: npx jest --coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Post coverage summary as PR comment
        if: github.event_name == 'pull_request' && hashFiles('coverage/coverage-summary.json') != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
            const t = summary.total;

            const body = [
              '## 📊 Coverage Report',
              '',
              '| Metric | Coverage |',
              '|--------|----------|',
              `| Statements | ${t.statements.pct.toFixed(1)}% |`,
              `| Branches | ${t.branches.pct.toFixed(1)}% |`,
              `| Functions | ${t.functions.pct.toFixed(1)}% |`,
              `| Lines | ${t.lines.pct.toFixed(1)}% |`,
            ].join('\n');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
